name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      CI: "true"
      REELYAI_SKIP_SKILL_INSTALL: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run release verification (offline + guardrails)
        run: npm run verify:release

      - name: Build Docker image
        run: docker build -t reelyai-agent:${{ github.sha }} .
