groups:
  - name: reelyai-availability
    rules:
      - alert: SeeReelServiceDown
        expr: up{job="reelyai"} == 0
        for: 2m
        labels:
          severity: P0
        annotations:
          summary: "SeeReel /metrics target is down"
          description: "Prometheus cannot scrape seereel:5173 for 2m. The app process may be crashed or hung."

      - alert: SeeReelNotReady
        expr: reelyai_ready == 0
        for: 2m
        labels:
          severity: P0
        annotations:
          summary: "SeeReel readiness is failing"
          description: "A hard dependency (data dir / store file / media dir) is not ready for 2m."

      - alert: SeeReelHealthProbeFailing
        expr: probe_success == 0
        for: 2m
        labels:
          severity: P0
        annotations:
          summary: "Health probe failing for {{ $labels.instance }}"
          description: "Blackbox probe to {{ $labels.instance }} has failed for 2m."

      - alert: SeeReelComponentDegraded
        expr: reelyai_component_up == 0
        for: 10m
        labels:
          severity: P1
        annotations:
          summary: "SeeReel component degraded: {{ $labels.component }}"
          description: "Component {{ $labels.component }} reported not-ok for 10m. readyz may still return 200 for soft deps (tos/seedream/seedance)."

  - name: reelyai-errors
    rules:
      - alert: SeeReelHigh5xxRate
        expr: |
          sum(rate(reelyai_http_requests_total{status=~"5.."}[5m]))
            / clamp_min(sum(rate(reelyai_http_requests_total[5m])), 1) > 0.05
        for: 5m
        labels:
          severity: P0
        annotations:
          summary: "SeeReel 5xx error rate > 5%"
          description: "HTTP 5xx rate has exceeded 5% of all requests for 5m."

      - alert: SeeReelStoreSaveErrors
        expr: increase(reelyai_store_save_total{status="error"}[5m]) > 0
        for: 0m
        labels:
          severity: P0
        annotations:
          summary: "SeeReel store save errors"
          description: "cinema-store.json failed to persist in the last 5m; risk of data loss."

      - alert: SeeReelHighLatencyP95
        expr: |
          histogram_quantile(0.95, sum(rate(reelyai_http_request_duration_seconds_bucket[5m])) by (le)) > 2
        for: 10m
        labels:
          severity: P1
        annotations:
          summary: "SeeReel P95 latency > 2s"
          description: "95th percentile HTTP latency has exceeded 2s for 10m."

  - name: reelyai-cost-and-capacity
    rules:
      - alert: SeeReelGenerationCapBlocking
        expr: increase(reelyai_generation_blocked_total[15m]) > 0
        for: 0m
        labels:
          severity: P2
        annotations:
          summary: "SeeReel generation daily cap is blocking submissions"
          description: "{{ $value }} paid generation submissions were blocked by the per-session daily cap in the last 15m. A user may be hitting the limit, or the cap may be too low."

      - alert: SeeReelAccessGuardDisabled
        expr: reelyai_access_guard_enabled == 0
        for: 15m
        labels:
          severity: P1
        annotations:
          summary: "SeeReel access token guard is disabled"
          description: "SEEREEL_ACCESS_TOKEN is not configured on a running instance. Sensitive APIs are open to anyone who can reach the server."

      - alert: SeeReelMediaGrowthHigh
        expr: increase(reelyai_media_dir_size_bytes[1h]) > 5 * 1024 * 1024 * 1024
        for: 0m
        labels:
          severity: P2
        annotations:
          summary: "SeeReel media dir grew > 5GB in 1h"
          description: "data/media grew rapidly; consider offloading to TOS/CDN and pruning local cache."

      - alert: SeeReelProcessMemoryHigh
        expr: reelyai_process_memory_rss_bytes > 1.5 * 1024 * 1024 * 1024
        for: 10m
        labels:
          severity: P1
        annotations:
          summary: "SeeReel RSS memory high"
          description: "Process RSS has exceeded 1.5GB for 10m; tune the memory budget or investigate a leak."

  - name: host
    rules:
      - alert: HostDiskAlmostFull
        expr: |
          (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"})) > 0.85
        for: 5m
        labels:
          severity: P0
        annotations:
          summary: "Host disk > 85% full on {{ $labels.mountpoint }}"
          description: "Filesystem {{ $labels.mountpoint }} is over 85% used for 5m."
