services:
  reelyai:
    build:
      context: ..
      dockerfile: Dockerfile
    image: reelyai-agent:latest
    restart: unless-stopped
    env_file:
      - ./.env.production
    expose:
      - "5173"
    volumes:
      - reelyai-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5173/api/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - reelyai
    env_file:
      - ./.env.production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  reelyai-data:
  caddy-data:
  caddy-config:
