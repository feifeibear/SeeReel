services:
  postgres:
    image: ${REELYAI_POSTGRES_IMAGE:-docker.m.daocloud.io/library/postgres:16-alpine}
    restart: unless-stopped
    env_file:
      - ./.env.production
    expose:
      - "5432"
    volumes:
      - reelyai-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  reelyai:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${REELYAI_NODE_IMAGE:-docker.m.daocloud.io/library/node:22-bookworm-slim}
    image: reelyai-agent:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./.env.production
    expose:
      - "5173"
    volumes:
      - reelyai-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5173/api/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  caddy:
    image: ${REELYAI_CADDY_IMAGE:-docker.m.daocloud.io/library/caddy:2-alpine}
    restart: unless-stopped
    depends_on:
      - reelyai
    env_file:
      - ./.env.production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  reelyai-data:
  reelyai-postgres:
  caddy-data:
  caddy-config:
