global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: reelyai
    metrics_path: /metrics
    static_configs:
      - targets:
          - reelyai:5173

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100

  # Blackbox probes the app's health endpoints so we alert on probe failure (external view).
  # Internal targets always work inside the Docker network; add the public URL to also catch
  # edge/Caddy/TLS problems.
  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://reelyai:5173/api/healthz
          - http://reelyai:5173/api/readyz
          # - https://your-domain.example/api/healthz
          # - https://your-domain.example/api/readyz
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
