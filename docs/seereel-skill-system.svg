<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1080" viewBox="0 0 1800 1080" role="img" aria-labelledby="title desc">
  <title id="title">SeeReel Skill System</title>
  <desc id="desc">A flow diagram for the SeeReel skill system from initial idea to script, assets, cinematography, canvas review, generation, fallback, and infrastructure controls.</desc>
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#263238" />
    </marker>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#246b8f" />
    </marker>
    <marker id="arrowRed" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#b23b3b" />
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#001219" flood-opacity="0.12" />
    </filter>
    <style>
      .bg { fill: #f7f7f2; }
      .title { font: 700 42px -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #1f2a2e; }
      .subtitle { font: 400 20px -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #546268; }
      .box { stroke-width: 2.5; filter: url(#softShadow); }
      .boxText { font: 700 26px -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #162126; }
      .smallText { font: 400 19px -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #405057; }
      .tinyText { font: 400 16px -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #5d6b70; }
      .label { font: 700 17px -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #263238; }
      .arrow { fill: none; stroke: #263238; stroke-width: 3; marker-end: url(#arrow); }
      .blueArrow { fill: none; stroke: #246b8f; stroke-width: 3; marker-end: url(#arrowBlue); }
      .redArrow { fill: none; stroke: #b23b3b; stroke-width: 3; marker-end: url(#arrowRed); }
      .dash { stroke-dasharray: 10 9; }
      .groupTitle { font: 700 22px -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #324147; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1080" />
  <text class="title" x="80" y="82">SeeReel Skill 体系：从一句话到可审阅、可回退、可生成的 Canvas</text>
  <text class="subtitle" x="82" y="120">核心原则：每一阶段产物都落到可见状态；终审 skill 对照 initial idea 与最终剧本大纲，发现偏离就回退到对应创作 skill。</text>

  <!-- Main pipeline boxes -->
  <rect class="box" x="80" y="210" width="220" height="128" rx="18" fill="#ffffff" stroke="#455a64" />
  <text class="boxText" x="190" y="258" text-anchor="middle">Initial idea</text>
  <text class="smallText" x="190" y="292" text-anchor="middle">用户一句话 / 文档 / 素材</text>
  <text class="tinyText" x="190" y="320" text-anchor="middle">source of intent</text>

  <rect class="box" x="370" y="190" width="260" height="168" rx="18" fill="#e9f5f0" stroke="#2f7d5c" />
  <text class="boxText" x="500" y="238" text-anchor="middle">聊剧本 skill</text>
  <text class="smallText" x="500" y="274" text-anchor="middle">seereel-script-chat</text>
  <text class="tinyText" x="500" y="306" text-anchor="middle">主题 / 人物弧光 / 结构</text>
  <text class="tinyText" x="500" y="332" text-anchor="middle">对白语言 / 叙事视角</text>

  <rect class="box" x="700" y="190" width="270" height="168" rx="18" fill="#fff4df" stroke="#9a6b16" />
  <text class="boxText" x="835" y="238" text-anchor="middle">选角布景 skill</text>
  <text class="smallText" x="835" y="274" text-anchor="middle">seereel-casting-assets</text>
  <text class="tinyText" x="835" y="306" text-anchor="middle">角色 / 场景 / 服装道具</text>
  <text class="tinyText" x="835" y="332" text-anchor="middle">reference assets + assetIds</text>

  <rect class="box" x="1045" y="190" width="270" height="168" rx="18" fill="#e8f1fb" stroke="#246b8f" />
  <text class="boxText" x="1180" y="238" text-anchor="middle">摄影 skill</text>
  <text class="smallText" x="1180" y="274" text-anchor="middle">seereel-cinematography</text>
  <text class="tinyText" x="1180" y="306" text-anchor="middle">storyboard / shot / prompt</text>
  <text class="tinyText" x="1180" y="332" text-anchor="middle">blocking / continuity bridge</text>

  <rect class="box" x="1390" y="182" width="310" height="184" rx="18" fill="#f3eafa" stroke="#73509a" />
  <text class="boxText" x="1545" y="230" text-anchor="middle">审阅 skill</text>
  <text class="smallText" x="1545" y="266" text-anchor="middle">seereel-canvas-review</text>
  <text class="tinyText" x="1545" y="298" text-anchor="middle">检查所有 Canvas node</text>
  <text class="tinyText" x="1545" y="324" text-anchor="middle">prompt / 连接 / assetIds / 剧本一致性</text>
  <text class="tinyText" x="1545" y="350" text-anchor="middle">允许此时完成所有生图</text>

  <!-- Artifact lane -->
  <rect class="box" x="392" y="455" width="220" height="112" rx="14" fill="#ffffff" stroke="#83a494" />
  <text class="boxText" x="502" y="500" text-anchor="middle">剧本大纲</text>
  <text class="smallText" x="502" y="532" text-anchor="middle">StoryPlan</text>

  <rect class="box" x="725" y="455" width="220" height="112" rx="14" fill="#ffffff" stroke="#b8944e" />
  <text class="boxText" x="835" y="500" text-anchor="middle">角色/场景资产</text>
  <text class="smallText" x="835" y="532" text-anchor="middle">assets + ids</text>

  <rect class="box" x="1065" y="455" width="230" height="112" rx="14" fill="#ffffff" stroke="#739bb2" />
  <text class="boxText" x="1180" y="500" text-anchor="middle">镜头与 Prompt</text>
  <text class="smallText" x="1180" y="532" text-anchor="middle">shots + rawPrompt</text>

  <!-- Review decision and output -->
  <path d="M 1545 455 L 1662 535 L 1545 615 L 1428 535 Z" fill="#ffffff" stroke="#73509a" stroke-width="2.5" filter="url(#softShadow)" />
  <text class="boxText" x="1545" y="522" text-anchor="middle">一致性</text>
  <text class="boxText" x="1545" y="555" text-anchor="middle">通过？</text>

  <rect class="box" x="1378" y="725" width="334" height="156" rx="18" fill="#eaf6ff" stroke="#246b8f" />
  <text class="boxText" x="1545" y="770" text-anchor="middle">进入生成</text>
  <text class="smallText" x="1545" y="806" text-anchor="middle">Publish TOS → serial render</text>
  <text class="smallText" x="1545" y="836" text-anchor="middle">poll retry → stitch</text>
  <text class="tinyText" x="1545" y="864" text-anchor="middle">final local path + browser URL</text>

  <!-- Infrastructure block -->
  <rect x="80" y="740" width="1110" height="210" rx="22" fill="#ffffff" stroke="#c9d1d5" stroke-width="2" />
  <text class="groupTitle" x="115" y="785">基础设施 skill：不直接创作，负责可见状态与自动化控制</text>

  <rect class="box" x="118" y="825" width="270" height="86" rx="14" fill="#f7fbfc" stroke="#90a4ae" />
  <text class="boxText" x="253" y="858" text-anchor="middle">seereel-shortdrama</text>
  <text class="tinyText" x="253" y="887" text-anchor="middle">端到端总编排 / 阶段推进</text>

  <rect class="box" x="465" y="825" width="270" height="86" rx="14" fill="#f7fbfc" stroke="#90a4ae" />
  <text class="boxText" x="600" y="858" text-anchor="middle">seereel-cli</text>
  <text class="tinyText" x="600" y="887" text-anchor="middle">状态检查 / 节点修复 / render</text>

  <rect class="box" x="812" y="825" width="318" height="86" rx="14" fill="#f7fbfc" stroke="#90a4ae" />
  <text class="boxText" x="971" y="858" text-anchor="middle">seereel-agent-session</text>
  <text class="tinyText" x="971" y="887" text-anchor="middle">REST 会话控制 / 持久化写回</text>

  <!-- Main arrows -->
  <path class="arrow" d="M 300 274 H 358" />
  <path class="arrow" d="M 630 274 H 688" />
  <path class="arrow" d="M 970 274 H 1033" />
  <path class="arrow" d="M 1315 274 H 1378" />

  <path class="blueArrow" d="M 500 358 V 443" />
  <path class="blueArrow" d="M 835 358 V 443" />
  <path class="blueArrow" d="M 1180 358 V 443" />
  <path class="blueArrow" d="M 1545 366 V 443" />

  <path class="arrow" d="M 612 511 H 713" />
  <path class="arrow" d="M 945 511 H 1053" />
  <path class="arrow" d="M 1295 511 H 1418" />
  <path class="blueArrow" d="M 1545 615 V 713" />
  <text class="label" x="1570" y="685">通过</text>

  <!-- Context arrows into review -->
  <path class="blueArrow dash" d="M 190 338 C 260 620 1130 660 1434 556" />
  <text class="label" x="615" y="660">审阅时回看 initial idea</text>
  <path class="blueArrow dash" d="M 502 567 C 655 675 1220 690 1442 575" />
  <text class="label" x="840" y="705">审阅时回看最终剧本大纲</text>

  <!-- Fallback arrows -->
  <path class="redArrow dash" d="M 1428 535 C 1240 650 560 650 500 370" />
  <text class="label" x="805" y="628" fill="#b23b3b">剧本偏离 → 回退聊剧本</text>

  <path class="redArrow dash" d="M 1445 589 C 1270 735 835 700 835 370" />
  <text class="label" x="930" y="742" fill="#b23b3b">资产矛盾 → 回退选角布景</text>

  <path class="redArrow dash" d="M 1492 611 C 1360 705 1180 690 1180 370" />
  <text class="label" x="1238" y="685" fill="#b23b3b">镜头/prompt 矛盾 → 回退摄影</text>

  <!-- Infra influence arrows -->
  <path class="blueArrow dash" d="M 253 825 C 360 645 425 505 425 360" />
  <path class="blueArrow dash" d="M 253 825 C 650 660 780 530 780 360" />
  <path class="blueArrow dash" d="M 253 825 C 930 650 1130 530 1130 360" />
  <path class="blueArrow dash" d="M 253 825 C 1180 650 1470 530 1490 370" />

  <path class="blueArrow dash" d="M 600 825 C 720 690 1330 640 1460 588" />
  <path class="blueArrow dash" d="M 971 825 C 1130 705 1370 650 1480 590" />
  <text class="tinyText" x="610" y="940">CLI / REST 只修复和写回状态：node、edge、assetIds、referenceVideoFromShotId、firstFrameAssetId、finalVideoUrl</text>

  <!-- Legend -->
  <rect x="1298" y="948" width="414" height="64" rx="12" fill="#ffffff" stroke="#d5dcdf" />
  <path class="arrow" d="M 1325 970 H 1380" />
  <text class="tinyText" x="1395" y="976">主流程</text>
  <path class="blueArrow dash" d="M 1470 970 H 1525" />
  <text class="tinyText" x="1540" y="976">审阅引用 / 自动化控制</text>
  <path class="redArrow dash" d="M 1325 995 H 1380" />
  <text class="tinyText" x="1395" y="1001">fallback 回退</text>
</svg>
